<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#ff707a"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Borde sutil -->
  <rect width="32" height="32" rx="8" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <!-- Línea de tendencia -->
  <polyline
    points="4,23 9,18 14,20 20,13 28,7"
    fill="none"
    stroke="url(#spark)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Punto final -->
  <circle cx="28" cy="7" r="2.8" fill="#ff707a"/>
  <!-- Área bajo la línea (sutil) -->
  <polygon
    points="4,23 9,18 14,20 20,13 28,7 28,27 4,27"
    fill="url(#spark)"
    opacity="0.08"
  />
</svg>
